<header class="topbar squircle">
  <a class="brand" routerLink="/">
    Courser
  </a>

  <nav class="topbar-actions">
    <button
      class="primary-button squircle"
      type="button"
      (click)="onSettingsClick()">
      Ustawienia
    </button>

    @if (isLoggedIn()) {
      <span class="user-badge squircle">{{ user()!.displayName }}</span>
      <button
        class="secondary-button squircle"
        type="button"
        (click)="logout()">
        Wyloguj
      </button>
    } @else {
      <a
        class="primary-button squircle"
        routerLink="/login">
        Zaloguj
      </a>
    }
  </nav>
</header>
