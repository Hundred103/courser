<section class="view-shell">
  <h2 class="neon-title">Dostępne quizy</h2>

  <p *ngIf="isLoading" class="status-text">Ładowanie quizów...</p>
  <p *ngIf="errorMessage" class="status-text error">{{ errorMessage }}</p>

  <div class="quiz-grid" *ngIf="!isLoading && !errorMessage">
    <article class="quiz-card squircle glow-hover fade-in" *ngFor="let quiz of quizzes">
      <h3>{{ quiz.title }}</h3>
      <a class="quiz-button primary-button squircle" [routerLink]="['/quiz', quiz.id]">Rozwiąż quiz</a>
    </article>
  </div>

  <p *ngIf="!isLoading && !errorMessage && quizzes.length === 0" class="status-text">
    Brak quizów. Dodaj pierwszy quiz po stronie backendu.
  </p>
</section>
