<section class="view-shell">
  <div class="auth-card squircle">
    <h2>Utwórz konto</h2>
    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="error-message" *ngIf="error">{{ error }}</div>

      <label class="field">
        <span>Adres e-mail</span>
        <input name="email" [(ngModel)]="model.email" type="email" required [disabled]="loading" />
      </label>

      <label class="field">
        <span>Nazwa wyświetlana</span>
        <input name="displayName" [(ngModel)]="model.displayName" required [disabled]="loading" />
      </label>

      <label class="field">
        <span>Hasło</span>
        <input type="password" name="password" [(ngModel)]="model.password" required [disabled]="loading" />
      </label>

      <label class="field">
        <span>Powtórz hasło</span>
        <input
          type="password"
          name="passwordConfirm"
          [(ngModel)]="model.passwordConfirm"
          required
          [disabled]="loading"
          [class.error]="passwordMismatch" />
      </label>

      <p class="error-message" *ngIf="passwordMismatch">Hasła nie są takie same</p>

      <div class="actions">
        <button class="primary-button squircle" type="submit" [disabled]="loading">
          {{ loading ? 'Rejestruj...' : 'Zarejestruj' }}
        </button>
        <a class="secondary-button squircle" routerLink="/">Anuluj</a>
      </div>

      <div class="auth-footer">
        <p>Masz już konto? <a routerLink="/login">Zaloguj się</a></p>
      </div>
    </form>
  </div>
</section>
