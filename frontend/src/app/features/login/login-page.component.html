<section class="auth-view">
  <div class="auth-card squircle fade-in">
    <div class="auth-heading">
      <h1>Zaloguj się</h1>
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      @if (error()) {
        <div class="error-message">{{ error() }}</div>
      }

      <label class="field">
        <span>Adres e-mail</span>
        <input name="email" [(ngModel)]="model.email" type="email" required [disabled]="loading()" />
      </label>

      <label class="field">
        <span>Hasło</span>
        <input type="password" name="password" [(ngModel)]="model.password" required [disabled]="loading()" />
      </label>

      <div class="actions">
        <button class="primary-button squircle" type="submit" [disabled]="loading()">
          {{ loading() ? 'Logowanie...' : 'Zaloguj' }}
        </button>
      </div>

      <div class="auth-footer">
        <p>Nie masz konta? <a routerLink="/register">Zarejestruj się</a></p>
      </div>
    </form>
  </div>
</section>
