server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: quiz-service
          uri: ${QUIZ_SERVICE_URL:http://localhost:8081}
          predicates:
            - name: Path
              args:
                patterns: '/api/quizzes/**'
          filters:
            - name: StripPrefix
              args:
                parts: 1

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - name: Path
              args:
                patterns: '/api/users/**'
          filters:
            - name: StripPrefix
              args:
                parts: 1

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
