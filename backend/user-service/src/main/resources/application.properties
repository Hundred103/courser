spring.application.name=user-service

server.port=8082

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/courserdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:courseruser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:courserpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Management/Actuator
management.endpoints.web.exposure.include=health,info
