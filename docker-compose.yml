services:
  postgres:
    image: postgres:16
    container_name: courser-postgres
    environment:
      POSTGRES_DB: courserdb
      POSTGRES_USER: courseruser
      POSTGRES_PASSWORD: courserpassword
    ports:
      - "5433:5432"
    volumes:
      - courser-postgres-data:/var/lib/postgresql/data
      - ./postgre/dump.sql:/docker-entrypoint-initdb.d/init.sql:ro

  quiz-service:
    build:
      context: ./backend/quiz-service
      dockerfile: Dockerfile
    container_name: courser-quiz
    depends_on:
      - postgres
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/courserdb
      SPRING_DATASOURCE_USERNAME: courseruser
      SPRING_DATASOURCE_PASSWORD: courserpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: courser-user-service
    depends_on:
      - postgres
    expose:
      - "8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/courserdb
      SPRING_DATASOURCE_USERNAME: courseruser
      SPRING_DATASOURCE_PASSWORD: courserpassword
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      APP_JWT_SECRET: courser-local-development-secret-change-me

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: courser-gateway
    depends_on:
      - quiz-service
      - user-service
    ports:
      - "8080:8080"
    environment:
      QUIZ_SERVICE_URL: http://quiz-service:8081
      USER_SERVICE_URL: http://user-service:8082
      APP_JWT_SECRET: courser-local-development-secret-change-me

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courser-frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"

volumes:
  courser-postgres-data:
    name: courser-postgres-data
